services:
  - type: web
    name: rentigo
    runtime: node
    plan: free
    buildCommand: npm install && npm run setup && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/rentigo.db
    disk:
      name: rentigo-data
      mountPath: /var/data
      sizeGB: 1
